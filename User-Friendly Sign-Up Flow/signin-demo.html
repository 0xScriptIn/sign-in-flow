<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User-Friendly Sign-In Flow Demo</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // This is a simplified demo version for HTML preview
        // For the full React implementation, use the .tsx components
        
        const SignInDemo = () => {
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [showPassword, setShowPassword] = React.useState(false);
            const [isLoading, setIsLoading] = React.useState(false);
            const [currentSlide, setCurrentSlide] = React.useState(0);

            const slides = [
                {
                    title: "Welcome back to your productivity hub",
                    description: "Join thousands of professionals who trust our platform to streamline their workflow.",
                    stats: [
                        { label: "Active Users", value: "50K+" },
                        { label: "Teams", value: "2.5K+" },
                        { label: "Projects", value: "100K+" }
                    ]
                },
                {
                    title: "Enterprise-grade security you can trust",
                    description: "Your data is protected with bank-level encryption and compliance standards.",
                    testimonial: {
                        quote: "The security features give us complete peace of mind.",
                        author: "Sarah Chen",
                        role: "Security Lead at TechCorp"
                    }
                },
                {
                    title: "Lightning-fast performance",
                    description: "Experience seamless collaboration with real-time syncing and 99.9% uptime.",
                    testimonial: {
                        quote: "Our team productivity increased by 40% since we started using this platform.",
                        author: "Marcus Rodriguez",
                        role: "Product Manager at InnovateNow"
                    }
                }
            ];

            React.useEffect(() => {
                const interval = setInterval(() => {
                    setCurrentSlide((prev) => (prev + 1) % slides.length);
                }, 4000);
                return () => clearInterval(interval);
            }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                
                // Simulate API call
                setTimeout(() => {
                    if (email === 'user@example.com' && password === 'password123') {
                        alert('Sign in successful! 🎉');
                    } else {
                        alert('Invalid credentials. Try: user@example.com / password123');
                    }
                    setIsLoading(false);
                }, 1500);
            };

            const currentSlideData = slides[currentSlide];

            return (
                <div className="min-h-screen flex flex-col lg:flex-row">
                    {/* Left Panel - Carousel */}
                    <div className="lg:w-1/2 bg-gradient-to-br from-blue-600 to-purple-700 p-8 flex items-center justify-center text-white">
                        <div className="w-full max-w-lg mx-auto text-center space-y-8">
                            {/* Icon */}
                            <div className="flex justify-center">
                                <div className="p-4 bg-white/10 rounded-2xl backdrop-blur-sm">
                                    <svg className="w-12 h-12" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M16 4c0-1.11.89-2 2-2s2 .89 2 2-.89 2-2 2-2-.89-2-2zM4 18v-6h2.5v6H4zm2.5-6.5H9V18h2v-8H6.5v2.5zM12 16h2.5v2H12v-2zm0-2.5h2.5V16H12v-2.5zm0-2.5h2.5v2.5H12V11zM18 8v2.5h-2.5V8H18zm0 2.5v2.5h-2.5v-2.5H18zm0 2.5V16H18v-2.5h-2.5V16H18z"/>
                                    </svg>
                                </div>
                            </div>

                            {/* Content */}
                            <div className="space-y-4">
                                <h2 className="text-3xl font-bold leading-tight">
                                    {currentSlideData.title}
                                </h2>
                                <p className="text-lg text-white/90 leading-relaxed">
                                    {currentSlideData.description}
                                </p>
                            </div>

                            {/* Stats or Testimonial */}
                            {currentSlideData.stats && (
                                <div className="grid grid-cols-3 gap-6 py-6">
                                    {currentSlideData.stats.map((stat, index) => (
                                        <div key={index} className="text-center">
                                            <div className="text-2xl font-bold">{stat.value}</div>
                                            <div className="text-sm text-white/80">{stat.label}</div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {currentSlideData.testimonial && (
                                <div className="bg-white/10 backdrop-blur-sm rounded-2xl p-6 space-y-4">
                                    <div className="flex justify-center mb-3">
                                        {[...Array(5)].map((_, i) => (
                                            <svg key={i} className="w-4 h-4 fill-yellow-400 text-yellow-400" viewBox="0 0 24 24">
                                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                                            </svg>
                                        ))}
                                    </div>
                                    <blockquote className="text-white/95 italic text-lg">
                                        "{currentSlideData.testimonial.quote}"
                                    </blockquote>
                                    <div className="text-center">
                                        <div className="font-semibold">{currentSlideData.testimonial.author}</div>
                                        <div className="text-sm text-white/80">{currentSlideData.testimonial.role}</div>
                                    </div>
                                </div>
                            )}

                            {/* Slide Indicators */}
                            <div className="flex justify-center space-x-2">
                                {slides.map((_, index) => (
                                    <button
                                        key={index}
                                        onClick={() => setCurrentSlide(index)}
                                        className={`w-2 h-2 rounded-full transition-all duration-300 ${
                                            index === currentSlide ? 'bg-white w-8' : 'bg-white/40'
                                        }`}
                                    />
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Right Panel - Sign In Form */}
                    <div className="lg:w-1/2 bg-white p-8 flex items-center justify-center">
                        <div className="w-full max-w-md space-y-8">
                            {/* Header */}
                            <div className="text-center">
                                <h1 className="text-2xl font-bold">Welcome back</h1>
                                <p className="text-gray-600 mt-2">Sign in to your account to continue</p>
                            </div>

                            {/* Demo Info */}
                            <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                                <div className="flex items-center">
                                    <svg className="w-4 h-4 text-blue-600 mr-2" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                                    </svg>
                                    <span className="text-sm text-blue-800">
                                        <strong>Demo:</strong> Use email "user@example.com" and password "password123"
                                    </span>
                                </div>
                            </div>

                            {/* Social Buttons */}
                            <div className="space-y-3">
                                <div className="grid grid-cols-2 gap-3">
                                    <button className="flex items-center justify-center px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                                        <svg className="w-4 h-4 mr-2" viewBox="0 0 24 24">
                                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                        </svg>
                                        Google
                                    </button>
                                    <button className="flex items-center justify-center px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
                                        <svg className="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 24 24">
                                            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                                        </svg>
                                        Apple
                                    </button>
                                </div>
                                
                                <div className="relative">
                                    <div className="absolute inset-0 flex items-center">
                                        <div className="w-full border-t border-gray-300"></div>
                                    </div>
                                    <div className="relative flex justify-center">
                                        <span className="bg-white px-3 text-gray-500 text-sm">Or continue with email</span>
                                    </div>
                                </div>
                            </div>

                            {/* Sign In Form */}
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div>
                                    <label htmlFor="email" className="block text-sm font-medium text-gray-700 mb-1">
                                        Email address
                                    </label>
                                    <div className="relative">
                                        <svg className="absolute left-3 top-3 h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                                        </svg>
                                        <input
                                            id="email"
                                            type="email"
                                            placeholder="Enter your email"
                                            value={email}
                                            onChange={(e) => setEmail(e.target.value)}
                                            className="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            required
                                        />
                                    </div>
                                </div>

                                <div>
                                    <label htmlFor="password" className="block text-sm font-medium text-gray-700 mb-1">
                                        Password
                                    </label>
                                    <div className="relative">
                                        <svg className="absolute left-3 top-3 h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                        </svg>
                                        <input
                                            id="password"
                                            type={showPassword ? 'text' : 'password'}
                                            placeholder="Enter your password"
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            className="w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                            required
                                        />
                                        <button
                                            type="button"
                                            onClick={() => setShowPassword(!showPassword)}
                                            className="absolute right-3 top-3 text-gray-400 hover:text-gray-600"
                                        >
                                            {showPassword ? (
                                                <svg className="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L3 3m6.878 6.878L21 21" />
                                                </svg>
                                            ) : (
                                                <svg className="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                                </svg>
                                            )}
                                        </button>
                                    </div>
                                </div>

                                <div className="flex items-center justify-between">
                                    <label className="flex items-center">
                                        <input type="checkbox" className="rounded border-gray-300 text-blue-600 focus:ring-blue-500" />
                                        <span className="ml-2 text-sm text-gray-600">Remember me</span>
                                    </label>
                                    <button type="button" className="text-sm text-blue-600 hover:text-blue-500">
                                        Forgot password?
                                    </button>
                                </div>

                                <button
                                    type="submit"
                                    disabled={isLoading}
                                    className="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                >
                                    {isLoading ? (
                                        <div className="flex items-center justify-center">
                                            <div className="animate-spin rounded-full h-4 w-4 border-b-2 border-white mr-2"></div>
                                            Signing in...
                                        </div>
                                    ) : (
                                        'Sign in'
                                    )}
                                </button>
                            </form>

                            <div className="text-center">
                                <p className="text-sm text-gray-600">
                                    Don't have an account?{' '}
                                    <button className="text-blue-600 hover:text-blue-500 font-medium">
                                        Sign up for free
                                    </button>
                                </p>
                            </div>

                            <p className="text-xs text-gray-500 text-center">
                                By signing in, you agree to our{' '}
                                <a href="#" className="underline hover:text-gray-700">Terms of Service</a>{' '}
                                and{' '}
                                <a href="#" className="underline hover:text-gray-700">Privacy Policy</a>
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<SignInDemo />, document.getElementById('root'));
    </script>
</body>
</html>
